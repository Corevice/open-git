apiVersion: v2
name: open-git
description: Open Git Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: postgresql
    version: ">=15.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: "postgresql.enabled"
  - name: redis
    version: ">=19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: "redis.enabled"
  - name: minio
    version: ">=14.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: "minio.enabled"
