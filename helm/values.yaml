global:
  databaseType: internal
  storageClass: ""

replicaCount: 1

image:
  backend:
    repository: ghcr.io/open-git/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/open-git/frontend
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  repositories:
    size: 50Gi
    accessMode: ReadWriteOnce
    retainOnDelete: true

db:
  type: sqlite  # sqlite or postgres
  sqlite:
    path: /data/open-git.db
  postgres:
    host: postgres
    port: 5432
    name: opengit
    user: opengit
    password: ""

externalDatabase:
  host: ""
  port: 5432
  database: opengit
  existingSecret: ""

postgresql:
  enabled: true

redis:
  enabled: true
  addr: redis:6379

minio:
  enabled: true
  endpoint: minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: open-git

ssh:
  enabled: true
  serviceType: LoadBalancer

secrets:
  existingSecret: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

ingress:
  enabled: false
  host: ""
  tls: false
  className: ""
  annotations: {}

worker:
  replicaCount: 1

service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
