global:
  databaseType: internal
  storageClass: ""

replicaCount: 1

image:
  backend:
    repository: ghcr.io/open-git/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/open-git/frontend
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Persistence for Git repositories.
#
# Migration guide (breaking change from flat reposSize-only schema):
#   - Old installs used persistence.repositories.{size,accessMode,retainOnDelete}.
#   - New flat keys (reposSize, reposPath, retainOnDelete) are preferred for new installs.
#   - Templates accept either form; reposSize takes precedence, then repositories.size.
#   - Default size is 50Gi.
#   - Set retainOnDelete: true (default) to annotate PVCs with helm.sh/resource-policy: keep
#     so data survives helm uninstall. Verify existing PVC reclaim policy in your cluster
#     before upgrading — shrinking size on an existing PVC is not supported by Kubernetes.
#
# Secret migration guide (upgrade from legacy -db / -minio Secrets):
#   1. Ensure install/upgrade passes all required --set secrets.* values (or use
#      secrets.existingSecret pointing at a pre-created Secret with keys:
#      jwt-secret, db-password, minio-access-key, minio-secret-key).
#   2. Run `helm upgrade` — Helm renders the unified -secrets Secret and updated
#      backend Deployment in the same release; Kubernetes creates the Secret before
#      rolling out pods that reference it.
#   3. Keep secrets.legacySecrets: true (default) until worker deployments are migrated
#      to the unified -secrets Secret; then set legacySecrets: false to remove duplicates.
persistence:
  enabled: true
  reposSize: "50Gi"
  reposPath: "/data/repos"
  retainOnDelete: true
  repositories:
    size: 50Gi
    accessMode: ReadWriteOnce
    retainOnDelete: true

db:
  type: sqlite  # sqlite or postgres
  sqlite:
    path: /data/open-git.db
  postgres:
    host: postgres
    port: 5432
    name: opengit
    user: opengit
    password: ""

externalDatabase:
  host: ""
  port: 5432
  database: opengit
  existingSecret: ""

postgresql:
  enabled: true

redis:
  enabled: true
  addr: redis:6379

minio:
  enabled: true
  endpoint: minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: open-git

ssh:
  enabled: true
  serviceType: LoadBalancer

# Secrets must be supplied at install time (empty defaults will fail template rendering).
# Example: --set secrets.jwtSecret=... --set secrets.minioAccessKey=... --set secrets.minioRootPassword=...
# Set existingSecret to skip chart-managed Secret creation and reference an external Secret
# (must contain keys: jwt-secret, db-password, minio-access-key, minio-secret-key).
secrets:
  existingSecret: ""
  jwtSecret: ""
  dbPassword: ""
  minioRootPassword: ""
  minioAccessKey: ""
  # Deprecated: legacy -db / -minio Secrets for backward compatibility with worker pods.
  # Set to false once all deployments reference the unified -secrets Secret.
  legacySecrets: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

ingress:
  enabled: false
  host: ""
  tls: false
  className: ""
  annotations: {}
  traefikCRD: false        # set true to use IngressRoute CRD instead of Ingress
  certResolver: "le"       # Traefik cert resolver name
  ssh:
    enabled: false         # create IngressRouteTCP for SSH Git access
    entrypoint: "ssh"      # Traefik entrypoint name for SSH

worker:
  replicaCount: 1

service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
