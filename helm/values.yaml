global:
  databaseType: internal
  storageClass: ""

config:
  appEnv: production
  logLevel: info

replicaCount: 1

image:
  backend:
    repository: ghcr.io/open-git/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/open-git/frontend
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  repositories:
    enabled: true
    mountPath: /data/repositories
    size: 50Gi
    accessMode: ReadWriteOnce
    retainOnDelete: true

config:
  appEnv: production
  logLevel: info

db:
  type: sqlite  # sqlite or postgres
  sqlite:
    path: /data/open-git.db
  postgres:
    host: postgres
    port: 5432
    name: opengit
    user: opengit
    password: ""

externalDatabase:
  host: ""
  port: 5432
  database: opengit
  existingSecret: ""

postgresql:
  enabled: true

redis:
  enabled: true
  addr: redis:6379

minio:
  enabled: true
  endpoint: minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: open-git

ssh:
  enabled: true
  serviceType: LoadBalancer

secrets:
  existingSecret: ""
  # Provide via --set / --set-file / -f at install time (never commit real values):
  #   secrets.jwtSecret, secrets.dbPassword (postgres), secrets.minioRootPassword, secrets.minioAccessKey
  # --set values are stored in Helm release metadata; prefer existingSecret for production.
  # legacySecrets creates the -db / -minio Secrets that the backend/worker/migration
  # Deployments reference by name. Keep true unless those workloads are rewired to the
  # unified -secrets Secret.
  legacySecrets: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

ingress:
  enabled: false
  host: ""
  tls: false
  className: ""
  annotations: {}
  traefikCRD: false        # set true to use IngressRoute CRD instead of Ingress
  certResolver: "le"       # Traefik cert resolver name
  ssh:
    enabled: false         # create IngressRouteTCP for SSH Git access
    entrypoint: "ssh"      # Traefik entrypoint name for SSH

worker:
  replicaCount: 1

service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
