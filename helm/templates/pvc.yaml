apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "open-git.fullname" . }}-repositories
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
  {{- if .Values.persistence.repositories.retainOnDelete }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.repositories.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.repositories.size }}
  storageClassName: {{ .Values.global.storageClass | default "" }}
