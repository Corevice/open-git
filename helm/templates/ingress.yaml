{{- if and .Values.ingress.enabled (not .Values.ingress.traefikCRD) }}
{{- $tls := .Values.ingress.tls }}
{{- $tlsEnabled := false }}
{{- $tlsCertManager := false }}
{{- if kindIs "map" $tls }}
{{- $tlsEnabled = $tls.enabled }}
{{- $tlsCertManager = $tls.certManager }}
{{- else if kindIs "bool" $tls }}
{{- $tlsEnabled = $tls }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "open-git.fullname" . }}
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
  {{- if or $tlsCertManager .Values.ingress.annotations }}
  annotations:
    {{- if $tlsCertManager }}
    cert-manager.io/cluster-issuer: {{ (index $tls "clusterIssuer" | default "letsencrypt-prod") | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tlsEnabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "open-git.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-git.fullname" . }}-backend
                port:
                  number: {{ .Values.service.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-git.fullname" . }}-frontend
                port:
                  number: {{ .Values.service.frontend.port }}
{{- end }}
