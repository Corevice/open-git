apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-git.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | default "production" | quote }}
  GIT_REPOS_PATH: {{ include "open-git.repositoriesMountPath" . | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
