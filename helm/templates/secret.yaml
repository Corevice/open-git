{{/*
Secrets should be passed at install time, e.g.:
  helm install open-git ./helm \
    --set secrets.jwtSecret=your-jwt-secret \
    --set secrets.dbPassword=your-db-password \
    --set secrets.minioRootPassword=your-minio-password
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-git.fullname" . }}
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  db-password: {{ .Values.secrets.dbPassword | b64enc | quote }}
  minio-root-password: {{ .Values.secrets.minioRootPassword | b64enc | quote }}
