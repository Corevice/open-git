{{/*
Secrets should be passed at install time, e.g.:
  helm install open-git ./helm \
    --set secrets.jwtSecret=your-jwt-secret \
    --set secrets.dbPassword=your-db-password \
    --set secrets.minioRootPassword=your-minio-password \
    --set secrets.minioAccessKey=your-minio-access-key

The main Secret uses the "-secrets" suffix to avoid colliding with the ConfigMap
({{ include "open-git.fullname" . }}). Set secrets.existingSecret to reference a
pre-created Secret instead. Legacy "-db" / "-minio" Secrets are optional (see
secrets.legacySecrets) for backward compatibility with existing worker deployments.

Warning: values passed via --set secrets.* are stored in Helm release metadata
(helm get values / helm history). Prefer secrets.existingSecret or --set-file for
production deployments.
*/}}
{{- if .Values.secrets.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.secrets.existingSecret }}
{{- if $existing }}
{{- $data := $existing.data | default dict }}
{{- if not (hasKey $data "jwt-secret") }}
{{- fail (printf "secrets.existingSecret %q is missing required key jwt-secret" .Values.secrets.existingSecret) }}
{{- end }}
{{- if and (eq .Values.db.type "postgres") (not (hasKey $data "db-password")) }}
{{- fail (printf "secrets.existingSecret %q is missing required key db-password (db.type is postgres)" .Values.secrets.existingSecret) }}
{{- end }}
{{- if and .Values.minio.enabled (not (hasKey $data "minio-access-key")) }}
{{- fail (printf "secrets.existingSecret %q is missing required key minio-access-key (minio.enabled)" .Values.secrets.existingSecret) }}
{{- end }}
{{- if and .Values.minio.enabled (not (hasKey $data "minio-secret-key")) }}
{{- fail (printf "secrets.existingSecret %q is missing required key minio-secret-key (minio.enabled)" .Values.secrets.existingSecret) }}
{{- end }}
{{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-git.fullname" . }}-secrets
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ required "secrets.jwtSecret is required — pass via --set secrets.jwtSecret=<value>" .Values.secrets.jwtSecret | b64enc | quote }}
  {{- if eq .Values.db.type "postgres" }}
  db-password: {{ required "secrets.dbPassword is required when db.type is postgres — pass via --set secrets.dbPassword=<value>" .Values.secrets.dbPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  minio-secret-key: {{ required "secrets.minioRootPassword is required when minio.enabled — pass via --set secrets.minioRootPassword=<value>" .Values.secrets.minioRootPassword | b64enc | quote }}
  minio-access-key: {{ required "secrets.minioAccessKey is required when minio.enabled — pass via --set secrets.minioAccessKey=<value>" .Values.secrets.minioAccessKey | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.secrets.legacySecrets (eq .Values.db.type "postgres") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-git.fullname" . }}-db
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ required "secrets.dbPassword is required when db.type is postgres — pass via --set secrets.dbPassword=<value>" .Values.secrets.dbPassword | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.legacySecrets .Values.minio.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-git.fullname" . }}-minio
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
type: Opaque
data:
  minio-secret-key: {{ required "secrets.minioRootPassword is required when minio.enabled — pass via --set secrets.minioRootPassword=<value>" .Values.secrets.minioRootPassword | b64enc | quote }}
  minio-access-key: {{ required "secrets.minioAccessKey is required when minio.enabled — pass via --set secrets.minioAccessKey=<value>" .Values.secrets.minioAccessKey | b64enc | quote }}
  # Deprecated aliases kept for worker pods that still reference legacy key names.
  secret-key: {{ required "secrets.minioRootPassword is required when minio.enabled — pass via --set secrets.minioRootPassword=<value>" .Values.secrets.minioRootPassword | b64enc | quote }}
  access-key: {{ required "secrets.minioAccessKey is required when minio.enabled — pass via --set secrets.minioAccessKey=<value>" .Values.secrets.minioAccessKey | b64enc | quote }}
{{- end }}
