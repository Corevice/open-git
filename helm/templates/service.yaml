apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}
    component: backend
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
    component: backend
  ports:
    - name: http
      port: {{ .Values.service.backend.port }}
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
    component: frontend
  ports:
    - name: http
      port: {{ .Values.service.frontend.port }}
      targetPort: 3000
      protocol: TCP
