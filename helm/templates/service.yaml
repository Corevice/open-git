apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-git.fullname" . }}-backend
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "open-git.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-git.fullname" . }}-frontend
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "open-git.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
