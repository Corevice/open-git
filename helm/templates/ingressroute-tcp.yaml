{{- if and .Values.ingress.enabled .Values.ingress.traefikCRD .Values.ingress.ssh.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "open-git.fullname" . }}-ssh
  labels:
    {{- include "open-git.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.ssh.entrypoint }}
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ include "open-git.fullname" . }}-backend
          port: 2222
{{- end }}
