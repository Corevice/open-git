apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: {{ .Release.Name }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      component: worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          args:
            - "--worker-only"
          env:
            - name: DB_TYPE
              value: "{{ .Values.db.type }}"
            {{- if eq .Values.db.type "postgres" }}
            - name: DB_DSN
              value: "postgres://{{ .Values.db.postgres.user }}:{{ .Values.db.postgres.password }}@{{ .Values.db.postgres.host }}:{{ .Values.db.postgres.port }}/{{ .Values.db.postgres.name }}?sslmode=disable"
            {{- end }}
            - name: REDIS_ADDR
              value: "{{ .Values.redis.addr }}"
            {{- if .Values.minio.enabled }}
            - name: MINIO_ENDPOINT
              value: "{{ .Values.minio.endpoint }}"
            {{- end }}
