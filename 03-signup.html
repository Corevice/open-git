


<meta charset="UTF-8">
<title>新規登録 - OpenHub</title>
<link rel="stylesheet" href="base.css">
<style>
  body {
    background: #f6f8fa;
    min-height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  }
  .signup-wrapper {
    max-width: 408px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .signup-brand {
    text-align: center;
    margin-bottom: 24px;
  }
  .signup-brand .logo {
    font-size: 48px;
    line-height: 1;
  }
  .signup-title {
    text-align: center;
    font-size: 24px;
    font-weight: 300;
    margin: 16px 0 24px;
    color: #1f2328;
  }
  .signup-card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    color: #1f2328;
  }
  .form-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 14px;
    background: #f6f8fa;
    box-sizing: border-box;
  }
  .form-input:focus {
    outline: none;
    border-color: #0969da;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
  }
  .form-hint {
    font-size: 12px;
    color: #59636e;
    margin-top: 6px;
  }
  .form-error {
    font-size: 12px;
    color: #cf222e;
    margin-top: 6px;
  }
  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #1f2328;
  }
  .checkbox-row a {
    color: #0969da;
    text-decoration: none;
  }
  .signup-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: #1f883d;
    color: #fff;
    border: 1px solid rgba(31,35,40,0.15);
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
  }
  .signup-btn:hover {
    background: #1a7f37;
  }
  .signin-card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    font-size: 14px;
    color: #1f2328;
  }
  .signin-card a {
    color: #0969da;
    text-decoration: none;
    font-weight: 500;
  }
  .signin-card a:hover {
    text-decoration: underline;
  }
  .password-strength {
    height: 4px;
    background: #d0d7de;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .password-strength-bar {
    height: 100%;
    width: 60%;
    background: #bf8700;
  }
  .footer-links {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: #59636e;
  }
  .footer-links a {
    color: #0969da;
    text-decoration: none;
    margin: 0 8px;
  }
</style>



<div class="signup-wrapper">
  <div class="signup-brand">
    <div class="logo">🐙</div>
  </div>
  <h1 class="signup-title">OpenHubへようこそ</h1>

  <div class="signup-card">
    <form>
      <div class="form-group">
        <label class="form-label" for="username">ユーザー名 *</label>
        <input class="form-input mono" type="text" id="username" value="octocat-dev" placeholder="例: your-name">
        <div class="form-hint">英数字とハイフンのみ使用可能。これがプロフィールURLになります。</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス *</label>
        <input class="form-input" type="email" id="email" value="dev@example.com" placeholder="you@example.com">
        <div class="form-hint">確認メールを送信します。</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">パスワード *</label>
        <input class="form-input" type="password" id="password" value="••••••••••••">
        <div class="password-strength">
          <div class="password-strength-bar"></div>
        </div>
        <div class="form-hint">15文字以上、または英数字+記号で8文字以上</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password2">パスワード（確認用） *</label>
        <input class="form-input" type="password" id="password2" value="••••••••••••">
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="notify">
        <label for="notify">製品の更新情報やお知らせをメールで受け取る</label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="terms">
        <label for="terms"><a href="03-signup.html">利用規約</a> および <a href="03-signup.html">プライバシーポリシー</a> に同意します *</label>
      </div>

      <a href="04-dashboard.html" class="signup-btn">アカウントを作成</a>
    </form>
  </div>

  <div class="signin-card">
    すでにアカウントをお持ちですか？ <a href="02-signin.html">サインイン →</a>
  </div>

  <div class="footer-links">
    <a href="03-signup.html">ヘルプ</a>
    <a href="03-signup.html">プライバシー</a>
    <a href="03-signup.html">利用規約</a>
    <div style="margin-top:8px;">© 2025 OpenHub, Inc.</div>
  </div>
</div>
