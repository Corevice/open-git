name: Helm CI

on:
  push:
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update helm/

      - name: Lint chart
        run: helm lint helm/ --strict

      - name: Validate templates
        run: |
          helm template gitforge helm/ > /tmp/rendered.yaml
          cat /tmp/rendered.yaml | docker run --rm -i ghcr.io/yannh/kubeconform:latest -strict -ignore-missing-schemas -

      - name: Dry-run install
        run: helm template gitforge helm/ --set ingress.host=test.example.com >/dev/null
