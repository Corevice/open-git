name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run SQLite unit tests
        run: go test ./... -count=1 -timeout 60s

      - name: Run PostgreSQL integration tests
        run: go test -tags integration ./internal/infrastructure/... -count=1 -timeout 120s
        env:
          DB_TYPE: postgres
          DB_DSN: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          working-directory: backend
          args: --timeout=5m

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out
