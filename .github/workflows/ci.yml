name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'go.work'
              - 'go.work.sum'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run SQLite unit tests
        run: go test ./... -count=1 -timeout 60s

      - name: Run PostgreSQL integration tests
        run: go test -tags integration ./internal/infrastructure/... -count=1 -timeout 120s
        env:
          DB_TYPE: postgres
          DB_DSN: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          # Build golangci-lint from source with the repo's Go toolchain: the
          # prebuilt binaries are compiled with an older Go than the project's
          # go directive (1.26.4), which golangci-lint refuses to run against.
          install-mode: goinstall
          working-directory: backend
          args: --timeout=5m

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npx vitest run

  compat-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run compatibility tests
        run: cd backend && go test ./internal/compat/... -v -count=1 -timeout 120s 2>&1 | tee compat-results.txt

      - name: Upload compat test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-test-results
          path: backend/compat-results.txt

  govulncheck:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly rather than gitleaks/gitleaks-action,
      # which now requires a paid license for organization-owned repos.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  validate-dashboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const fs=require('fs'); const dir='deploy/grafana/dashboards'; fs.readdirSync(dir).filter(f=>f.endsWith('.json')).forEach(f=>{const d=JSON.parse(fs.readFileSync(dir+'/'+f,'utf8'));if(!d.uid||!d.schemaVersion)throw new Error('missing uid/schemaVersion in '+f);if(!d.templating||!d.templating.list.some(v=>v.name==='organization_id'))throw new Error('missing organization_id variable in '+f);console.log('OK',f)})"

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Validate frontmatter
        run: npx tsx scripts/validate-frontmatter.ts
      - name: Build static site
        run: npm run build
      - name: Generate Pagefind index
        run: npx pagefind --site out
      - name: Check dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --root-dir docs/out --fallback-extensions html --exclude-path docs/out/404.html './docs/out/**/*.html'
          fail: true
