name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'middleware.ts'
              - 'next.config.mjs'
              - 'package.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - '*.ts'
              - '*.tsx'
              - '.github/**'

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20

      - uses: actions/cache@v4
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        run: npm ci

      - name: Lint
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        run: npm run lint

      - name: Typecheck
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        run: npx tsc --noEmit

      - name: Test
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        run: npx vitest run

      - name: Build
        if: steps.filter.outputs.app == 'true' || github.ref == 'refs/heads/main'
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.golangci.yml'
              - 'go.work'
              - 'go.work.sum'
              - '.github/**'

      - uses: actions/setup-go@v5
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        with:
          go-version: '1.25'

      - uses: actions/cache@v4
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Vet
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: go vet ./...

      - name: Install golangci-lint
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.1.0

      - name: golangci-lint
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: golangci-lint run ./... --timeout=5m

      - name: Test with race detector
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          if (( $(echo "$total < 60" | bc -l) )); then
            echo "Coverage ${total}% below 60% threshold"
            exit 1
          fi

      - name: Build
        if: steps.filter.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        run: go build ./cmd/server
